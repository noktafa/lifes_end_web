<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life's End - Nihilistic Virus Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 1920px;
            max-height: 1080px;
        }
        
        canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0ff;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            text-align: center;
            text-shadow: 0 0 20px #0ff;
            pointer-events: none;
            z-index: 10;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid transparent;
            border-top-color: #0ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #0ff;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            opacity: 0.7;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="loading">
            <div class="spinner"></div>
            <div>INITIALIZING VIRUS...</div>
        </div>
        <div id="instructions">
            W/A/S/D or Arrows: Move | Space/Click: Shoot | Shift: Boost | Q: Nuke
        </div>
    </div>
    
    <script type="module">
        import init from './lifes_end.js';
        
        async function run() {
            const loading = document.getElementById('loading');
            
            try {
                await init();
                loading.style.display = 'none';
            } catch (e) {
                loading.innerHTML = `<div style="color: #f55;">ERROR: ${e.message}</div>`;
                console.error(e);
            }
        }
        
        run();
    </script>
</body>
</html>
